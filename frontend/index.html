<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div>
          <h1>House Price Predictor</h1>
          <p>Enter property details and receive a data-driven house price estimate in seconds.</p>
        </div>
      </section>

      <section class="card form-card">
        <form id="prediction-form">
          <div class="field-row">
            <label for="area">Area (sq ft)</label>
            <input id="area" name="area" type="number" min="300" step="1" required />
          </div>
          <div class="field-row">
            <label for="bedrooms">Bedrooms</label>
            <input id="bedrooms" name="bedrooms" type="number" min="0" step="1" required />
          </div>
          <div class="field-row">
            <label for="bathrooms">Bathrooms</label>
            <input id="bathrooms" name="bathrooms" type="number" min="1" step="0.5" required />
          </div>
          <div class="field-row">
            <label for="year_built">Year Built</label>
            <input id="year_built" name="year_built" type="number" min="1900" max="2026" step="1" required />
          </div>
          <div class="field-row">
            <label for="garage">Garage spaces</label>
            <input id="garage" name="garage" type="number" min="0" max="5" step="1" required />
          </div>
          <div class="field-row">
            <label for="lot_size">Lot size (sq ft)</label>
            <input id="lot_size" name="lot_size" type="number" min="1000" step="50" required />
          </div>
          <div class="field-row">
            <label for="location">Location</label>
            <select id="location" name="location" required>
              <option value="Downtown">Downtown</option>
              <option value="Suburb">Suburb</option>
              <option value="Uptown">Uptown</option>
            </select>
          </div>
          <button type="submit" class="submit-button">Calculate Price</button>
        </form>
        <div class="result-panel" id="result-panel">
          <h2>Estimated value</h2>
          <p id="prediction-text">Enter details and submit to see the estimate.</p>
        </div>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
